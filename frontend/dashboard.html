<!DOCTYPE html>
<html lang="es">
<head>
  <title>Dashboard - AquAti</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dashboard-layout">
  <aside class="sidebar">
    <h2 style="margin-bottom: 40px;">AquAti</h2>
    <nav>
      <p style="opacity: 0.5; font-size: 0.8em; margin-bottom: 20px;">PANEL</p>
      <div style="margin-bottom: 20px; font-weight: bold; cursor: pointer;">Resumen</div>
      <div style="margin-bottom: 20px; opacity: 0.7; cursor: pointer;">Historial</div>
      <div style="margin-bottom: 20px; opacity: 0.7; cursor: pointer;">Dispositivos</div>
    </nav>
  </aside>

  <main class="main-content">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
      <h1>Hola, Usuario</h1>
      <button type="button" class="btn-cerrarS">Cerrar sesión</button>
    </header>

    <div class="cards-grid">
      <div class="stat-card">
        <h4>Litros totales</h4>
        <div class="value" data-target="12345">0</div>
      </div>
      <div class="stat-card">
        <h4>Litros hoy</h4>
        <div class="value" data-target="450">0</div>
      </div>
      <div class="stat-card">
        <h4>Calidad del Agua</h4>
        <div class="value" style="color: var(--secondary);">Óptima</div>
      </div>
    </div>

    <div class="card" style="padding: 30px;">
      <h4 style="margin-bottom: 20px;">Consumo Semanal</h4>
      <canvas id="dashboardChart"></canvas>
    </div>
  </main>

  <script>
    // Animación de números (Counters)
    const counters = document.querySelectorAll('.value[data-target]');
    counters.forEach(counter => {
      const target = +counter.getAttribute('data-target');
      const speed = 200;
      const updateCount = () => {
        const count = +counter.innerText;
        const inc = target / speed;
        if (count < target) {
          counter.innerText = Math.ceil(count + inc);
          setTimeout(updateCount, 1);
        } else {
          counter.innerText = target.toLocaleString() + ' L';
        }
      };
      updateCount();
    });

    // Chart.js con animación suave
    const ctx = document.getElementById('dashboardChart').getContext('2d');
    new Chart(ctx, {
      type: 'line', // Cambiado a línea para un look más "tech"
      data: {
        labels: ['Lun', 'Mar', 'Mie', 'Jue', 'Vie', 'Sab', 'Dom'],
        datasets: [{
          label: 'Consumo (L)',
          data: [350, 420, 380, 500, 450, 600, 480],
          borderColor: '#007bff',
          backgroundColor: 'rgba(0, 123, 255, 0.1)',
          fill: true,
          tension: 0.4
        }]
      }
    });
  </script>
</body>
</html>
