<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - AquAti</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">💧</div>
      <h2>Bienvenido de nuevo</h2>
      <p>Ingresa a tu panel de control AquAti</p>
    </div>
    
    <form id="loginForm" class="login-form">
      <div class="form-group">
        <label>Correo electrónico</label>
        <!-- ✅ Agregado id="email" -->
        <input type="email" id="email" name="email" placeholder="tu@correo.com" required>
      </div>
      
      <div class="form-group">
        <label>Contraseña</label>
        <!-- ✅ Agregado id="password" -->
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      
      <!-- ✅ Contenedor para mensajes de error (ya existe en tu login.js) -->
      <div id="emailError" class="error-message" style="color: red; font-size: 0.8em; margin-top: -10px;"></div>
      <div id="passwordError" class="error-message" style="color: red; font-size: 0.8em;"></div>
      <div id="loginMessage" class="form-message"></div>
      
      <button type="submit" class="btn-login-modern">
        <span>Iniciar sesión</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
    </form>
    
    <div class="login-footer">
      <p>¿No tienes cuenta aún? <a href="index.html">Crea una cuenta gratis</a></p>
    </div>
  </div>

  <!-- ✅ Cargar el script de login (eliminé el script interno que causaba el problema) -->
  <script src="js/login.js"></script>
</body>
</html>
