<!DOCTYPE html>
<html lang="es">
<head>
  <title>Iniciar Sesión - AquAti</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5;">
  <div class="card" style="width: 100%; max-width: 400px; padding: 40px; animation: fadeInUp 0.8s ease;">
    <h2 style="text-align: center; margin-bottom: 10px;">Bienvenido</h2>
    <p style="text-align: center; color: #666; margin-bottom: 30px;">Ingresa a tu panel de AquAti</p>
    
    <form id="loginForm">
      <label style="display:block; margin-bottom: 8px; font-weight: bold;">Email</label>
      <input type="email" placeholder="correo@ejemplo.com" required style="width:100%; padding:12px; margin-bottom:20px; border-radius:8px; border:1px solid #ddd;">
      
      <label style="display:block; margin-bottom: 8px; font-weight: bold;">Contraseña</label>
      <input type="password" placeholder="••••••••" required style="width:100%; padding:12px; margin-bottom:25px; border-radius:8px; border:1px solid #ddd;">
      
      <button type="submit" class="btn-login">Entrar</button>
    </form>
    
    <p style="text-align: center; margin-top: 20px; font-size: 0.9em;">
      ¿No tienes cuenta? <a href="index.html" style="color: var(--primary); font-weight: bold;">Regístrate</a>
    </p>
  </div>
</body>
</html>
